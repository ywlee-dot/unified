services:
  db:
    ports: []  # 외부 노출 차단
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # 반드시 강력한 비밀번호 사용

  redis:
    ports: []  # 외부 노출 차단

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    ports: []  # Nginx가 프록시하므로 외부 노출 불필요
    volumes:
      - uploads_data:/app/uploads
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      N8N_BASE_URL: http://n8n:5678
      N8N_WEBHOOK_BASE_1: ${N8N_WEBHOOK_BASE_1}
      N8N_WEBHOOK_BASE_2: ${N8N_WEBHOOK_BASE_2:-}
      N8N_WEBHOOK_BASE_3: ${N8N_WEBHOOK_BASE_3:-}
      N8N_API_KEY: ${N8N_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      MOCK_MODE: ${MOCK_MODE:-0}
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-evaluation-guidelines}
      CORS_ORIGINS: ${CORS_ORIGINS}
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    ports: []  # Nginx가 프록시
    volumes: []  # 프로덕션에서는 소스 마운트 제거
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      INTERNAL_API_URL: http://backend:8000/api

  n8n:
    ports: []  # Nginx가 프록시
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      WEBHOOK_URL: ${N8N_PUBLIC_URL:-http://localhost/webhook}  # 외부에서 접근 가능한 webhook URL
      N8N_PATH: /n8n/                # Nginx 서브패스에 맞춤
      N8N_EDITOR_BASE_URL: ${N8N_PUBLIC_URL:-http://localhost}/n8n/
      GENERIC_TIMEZONE: Asia/Seoul

  # --- Nginx 리버스 프록시 ---
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro  # SSL 인증서 (선택)
    depends_on:
      - frontend
      - backend
      - n8n
    networks:
      - frontend-net
      - backend-net
