# 개발 환경 전용 오버라이드
# 사용법: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
services:
  backend:
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
